# Маппинг alias → конкретная модель LiteLLM.
# Меняй здесь — код не трогается.
#
# По умолчанию: Ollama локально (бесплатно, оффлайн, без rate limits).
# Установка: https://ollama.com/download → ollama pull gemma3:4b
#
# Префикс ollama_chat/ обязателен для LiteLLM (chat completions API с vision).

# Gemma 3 4B — мультимодальная Google open-weights, ~3.5 GB VRAM.
# Одна модель для vision и text — экономит VRAM (нет переключений в памяти).
vision_primary: ollama_chat/gemma3:4b
vision_fallback: ollama_chat/gemma3:4b

text_primary: ollama_chat/gemma3:4b
text_fallback: ollama_chat/gemma3:4b

# Embeddings: Ollama даёт через ollama/nomic-embed-text (если нужно).
# В MVP не используется — оставим как заглушку.
embed_primary: ollama/nomic-embed-text
