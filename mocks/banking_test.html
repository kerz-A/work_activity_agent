<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test Bank — Personal Account</title>
<style>
body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; }
.header { background: #003a70; color: white; padding: 20px 32px; }
.brand { font-size: 24px; font-weight: 600; }
.disclaimer { background: #fff8dc; padding: 8px 32px; font-size: 12px; color: #666; }
.main { padding: 32px; max-width: 900px; margin: 0 auto; }
h1 { color: #003a70; }
.card { border: 1px solid #ddd; border-radius: 8px; padding: 24px; margin: 24px 0; }
.card-number { font-family: monospace; font-size: 28px; letter-spacing: 4px; color: #003a70; }
.label { color: #666; font-size: 12px; text-transform: uppercase; }
.value { font-size: 16px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="header">
  <div class="brand">🏦 Test Bank Online</div>
  <div>Welcome, Test User!</div>
</div>
<div class="disclaimer">⚠️ TEST DATA — NOT REAL ACCOUNT. All numbers are synthetic test values.</div>
<div class="main">
  <h1>Account Overview</h1>

  <div class="card">
    <div class="label">Card number (test Visa)</div>
    <div class="card-number">4111 1111 1111 1111</div>
    <div class="label">Expires</div>
    <div class="value">12/29</div>
    <div class="label">Account holder</div>
    <div class="value">JOHN DOE</div>
    <div class="label">Balance</div>
    <div class="value">$1,234.56</div>
  </div>

  <div class="card">
    <div class="label">IBAN</div>
    <div class="value" style="font-family: monospace;">DE89 3704 0044 0532 0130 00</div>
    <div class="label">Account #</div>
    <div class="value" style="font-family: monospace;">000 123 456 789</div>
  </div>
</div>
</body>
</html>
