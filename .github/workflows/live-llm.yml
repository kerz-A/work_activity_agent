name: Live LLM Tests (manual)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Зачем запускаем (изменили промпт, проверка регрессии и т.п.)"
        required: true
        type: string

env:
  PYTHON_VERSION: "3.12"

jobs:
  live-llm:
    name: Live LLM tests
    runs-on: ubuntu-latest
    environment: live-llm
    steps:
      - uses: actions/checkout@v4

      - name: Echo reason
        run: 'echo "Запуск инициирован: ${{ inputs.reason }}"'

      - name: Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-rus

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Run live LLM tests
        env:
          LLM_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run pytest -m live_llm -v
